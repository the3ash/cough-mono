name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          npm ci --ignore-scripts
          python -m pip install "fonttools[woff]==4.63.0"

      - name: Validate release versions
        run: |
          package_version="$(node -p "require('./package.json').version")"
          if [[ "$GITHUB_REF_NAME" != "v$package_version" ]]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match package version $package_version"
            exit 1
          fi
          python scripts/validate-font-versions.py "$package_version"

      - name: Inspect npm package
        run: npm pack --dry-run

  publish-npm:
    needs: validate
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Set up npm
        run: npm install --global npm@11.16.0

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Publish npm package
        run: npm publish --provenance --access public

  deploy-cdn:
    needs: publish-npm
    uses: ./.github/workflows/deploy-cdn.yml

  release-github:
    needs: deploy-cdn
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Prepare archive name
        id: prep
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Package fonts
        run: |
          zip "CoughMono-${{ steps.prep.outputs.version }}.zip" \
            fonts/CoughMono-Regular.otf \
            fonts/CoughMono-Regular.ttf \
            fonts/CoughMono-Regular.woff2

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          ARCHIVE: CoughMono-${{ steps.prep.outputs.version }}.zip
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" "$ARCHIVE" --clobber
          else
            gh release create "$GITHUB_REF_NAME" "$ARCHIVE" \
              --generate-notes \
              --title "$GITHUB_REF_NAME" \
              --verify-tag
          fi
