name: Release

on:
  push:
    branches:
      - main
    paths:
      - package.json
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      release_required: ${{ steps.release.outputs.release_required }}
      version: ${{ steps.release.outputs.version }}
      tag: ${{ steps.release.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Check release version
        id: release
        env:
          BEFORE_SHA: ${{ github.event.before }}
          FORCE_RELEASE: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          if [[ "$FORCE_RELEASE" == "true" ]]; then
            node scripts/check-release.mjs --force >> "$GITHUB_OUTPUT"
          else
            node scripts/check-release.mjs --before "$BEFORE_SHA" >> "$GITHUB_OUTPUT"
          fi

  validate:
    needs: prepare
    if: needs.prepare.outputs.release_required == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          npm ci --ignore-scripts
          python -m pip install "fonttools[woff]==4.63.0"

      - name: Test
        run: npm test

      - name: Validate release versions
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          package_version="$(node -p "require('./package.json').version")"
          if [[ "$package_version" != "$VERSION" ]]; then
            echo "::error::Package version $package_version does not match release version $VERSION"
            exit 1
          fi
          python scripts/validate-font-versions.py "$VERSION"

      - name: Inspect npm package
        run: npm pack --dry-run

  tag:
    needs:
      - prepare
      - validate
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Create annotated tag
        env:
          TAG: ${{ needs.prepare.outputs.tag }}
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          if git rev-parse --verify "refs/tags/$TAG" >/dev/null 2>&1; then
            tagged_commit="$(git rev-list -n 1 "$TAG")"
            if [[ "$tagged_commit" != "$GITHUB_SHA" ]]; then
              echo "::error::Tag $TAG already points to $tagged_commit"
              exit 1
            fi
            echo "Tag $TAG already points to this commit"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "$TAG" -m "Cough Mono $VERSION"
            git push origin "$TAG"
          fi

  publish-npm:
    needs:
      - prepare
      - tag
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Set up npm
        run: npm install --global npm@11.16.0

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Publish npm package
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          if npm view "@the3ash/cough-mono@$VERSION" version >/dev/null 2>&1; then
            echo "@the3ash/cough-mono@$VERSION is already published"
          else
            npm publish --provenance --access public
          fi

  release-github:
    needs:
      - prepare
      - publish-npm
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Package fonts
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          zip "CoughMono-$VERSION.zip" \
            fonts/CoughMono-Regular.otf \
            fonts/CoughMono-Regular.ttf \
            fonts/CoughMono-Regular.woff2

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.prepare.outputs.tag }}
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          archive="CoughMono-$VERSION.zip"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$archive" --clobber
          else
            gh release create "$TAG" "$archive" \
              --generate-notes \
              --title "$TAG" \
              --verify-tag
          fi

  deploy-cdn:
    needs: release-github
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Deploy CDN
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npm run deploy:cdn
