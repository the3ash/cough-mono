name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          npm ci --ignore-scripts
          python -m pip install "fonttools[woff]==4.63.0"

      - name: Validate release versions
        run: |
          package_version="$(node -p "require('./package.json').version")"
          if [[ "$GITHUB_REF_NAME" != "v$package_version" ]]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match package version $package_version"
            exit 1
          fi
          python scripts/validate-font-versions.py "$package_version"

      - name: Inspect npm package
        run: npm pack --dry-run

  publish-npm:
    needs: validate
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Set up npm
        run: npm install --global npm@11.16.0

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Publish npm package
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  release-github:
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare archive name
        id: prep
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Package fonts
        run: |
          zip "CoughMono-${{ steps.prep.outputs.version }}.zip" \
            fonts/CoughMono-Regular.otf \
            fonts/CoughMono-Regular.ttf \
            fonts/CoughMono-Regular.woff2

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: CoughMono-${{ steps.prep.outputs.version }}.zip
          generate_release_notes: true
