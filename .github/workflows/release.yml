name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare archive name
        id: prep
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Package fonts
        run: |
          zip "CoughMono-${{ steps.prep.outputs.version }}.zip" \
            fonts/CoughMono-Regular.otf \
            fonts/CoughMono-Regular.ttf \
            fonts/CoughMono-Regular.woff2

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: CoughMono-${{ steps.prep.outputs.version }}.zip
          generate_release_notes: true
